{% extends 'base.html' %}

{% block title %}Submit{% endblock %}

{% block content %}
<p>You are {{ current_user.username }}</p>

<form action="/submit" method="POST" enctype="multipart/form-data" class="submission-form" style="margin-top: 20px;">
    <div id="dropzone" class="dropzone">
        Drag &amp; drop file(s) here, or
        <input type="file" id="files" name="files" multiple>
        <div id="file-list" class="file-list"></div>
    </div>

    <div style="margin-bottom: 10px; margin-top: 10px;">
        <label for="shortname">Shortname:</label><br>
        <input type="text" id="shortname" name="shortname" maxlength="64" style="width: 150px;">
    </div>

    <div style="margin-bottom: 10px;">
        <label for="language">Language:</label><br>
        <select id="language" name="language" style="width: 160px;">
            <option value="Python 3">Python 3</option>
            <option value="C++">C++</option>
            <option value="Rust">Rust</option>
        </select>
    </div>

    <button type="submit">Submit Code</button>

    <div style="margin-top: 16px;">
        <label for="code">Code (optional if files uploaded):</label><br>
        <textarea id="code" name="code" rows="20" cols="80" style="width: 100%;"></textarea>
    </div>
</form>

<script src="{{ url_for('static', filename='js/submit.js') }}" defer></script>
{% endblock %}
